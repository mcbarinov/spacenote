x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  caddy:
    image: ${CADDY_IMAGE:-caddy:2.10.2-alpine}
    container_name: spacenote-caddy-local
    restart: unless-stopped
    ports:
      - "8080:80"
    entrypoint: /bin/sh
    command: >
      -c "echo '
      :80 {
        reverse_proxy /api/* backend:8000
        reverse_proxy frontend:4173
      }
      ' | caddy run --config /dev/stdin --adapter caddyfile"
    networks:
      - spacenote-local
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    logging: *default-logging

  mongodb:
    image: ${MONGODB_IMAGE:-mongodb/mongodb-community-server:8.0.12-ubi9}
    container_name: spacenote-mongodb-local
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGODB_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME:-root}
      MONGODB_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-localdev}
      MONGODB_INITDB_DATABASE: spacenote
    volumes:
      - ./data/db:/data/db:z
      - ./data/configdb:/data/configdb:z
    networks:
      - spacenote-local
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      start_period: 5s
      interval: 5s
      timeout: 10s
      retries: 3
    logging: *default-logging

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: spacenote-backend-local
    restart: unless-stopped
    environment:
      SPACENOTE_DATABASE_URL: mongodb://${MONGODB_ROOT_USERNAME:-root}:${MONGODB_ROOT_PASSWORD:-localdev}@mongodb:27017/spacenote?authSource=admin
      SPACENOTE_CORS_ORIGINS: '["http://localhost:8080"]'
      SPACENOTE_HOST: 0.0.0.0
      SPACENOTE_PORT: 8000
      SPACENOTE_DEBUG: ${DEBUG:-true}
      SPACENOTE_DATA_DIR: /data
      SPACENOTE_MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-}
      SPACENOTE_SITE_URL: http://localhost:8080
    volumes:
      - ./data/app:/data
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - spacenote-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      start_period: 3s
      interval: 5s
      timeout: 5s
      retries: 3
    logging: *default-logging

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    container_name: spacenote-frontend-local
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - spacenote-local
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4173"]
      start_period: 2s
      interval: 5s
      timeout: 5s
      retries: 3
    logging: *default-logging

networks:
  spacenote-local:
    driver: bridge
